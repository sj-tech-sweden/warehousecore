# WarehouseCore ESPHome LED Controller
#
# ESPHome-based LED controller firmware for WarehouseCore warehouse highlighting.
# Fully compatible with the existing Arduino firmware MQTT protocol, but also
# exposes native Home Assistant entities for dual control.
#
# Usage:
#   1. Copy secrets.yaml.template to secrets.yaml and fill in credentials
#   2. Adjust substitutions below (led_count, led_pin)
#   3. Install: esphome run warehousecore_led_controller.yaml
#
# Supports: ESP32, ESP32-S2, ESP32-S3, ESP32-C3, ESP32-C6

substitutions:
  # Controller identity — auto-generated from MAC suffix at runtime.
  # The prefix is combined with the last 6 hex chars of the MAC address
  # to form the controller_id (e.g., "esp-a1b2c3").
  controller_id_prefix: "esp"

  # MQTT topic prefix — must match LED_MQTT_TOPIC_PREFIX in WarehouseCore .env
  topic_prefix: "weidelbach"

  # Warehouse ID — must match LED_WAREHOUSE_ID in WarehouseCore .env
  warehouse_id: "WDL"

  # LED strip configuration
  led_count: "600"
  led_pin: "GPIO5"

  # Heartbeat interval in seconds
  heartbeat_interval: "15"

  # Firmware version
  firmware_version: "1.0.0"

esphome:
  name: warehousecore-led
  name_add_mac_suffix: true
  friendly_name: "WarehouseCore LED Controller"
  includes:
    - ArduinoJson.h
  on_boot:
    priority: 600
    then:
      - lambda: |-
          // Build controller_id from MAC suffix
          uint8_t mac[6];
          esp_read_mac(mac, ESP_MAC_WIFI_STA);
          char suffix[7];
          snprintf(suffix, sizeof(suffix), "%02x%02x%02x", mac[3], mac[4], mac[5]);
          id(controller_id) = std::string("${controller_id_prefix}-") + suffix;
          id(topic_suffix) = id(controller_id);
          // Build MAC address string (no colons, lowercase)
          char mac_str[13];
          snprintf(mac_str, sizeof(mac_str), "%02x%02x%02x%02x%02x%02x",
                   mac[0], mac[1], mac[2], mac[3], mac[4], mac[5]);
          id(mac_address) = std::string(mac_str);
          ESP_LOGI("boot", "Controller ID: %s", id(controller_id).c_str());
          ESP_LOGI("boot", "MAC: %s", id(mac_address).c_str());

esp32:
  board: esp32dev
  framework:
    # NOTE: For XIAO ESP32-C6, change to: type: esp-idf
    # See the Board-Specific Configuration section in README.md
    type: arduino

logger:
  level: INFO

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "WC-LED-Fallback"
    password: !secret ap_password

captive_portal:

globals:
  - id: controller_id
    type: std::string
    restore_value: false
    initial_value: '"esp-000000"'
  - id: topic_suffix
    type: std::string
    restore_value: false
    initial_value: '"esp-000000"'
  - id: mac_address
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: active_led_count
    type: int
    restore_value: false
    initial_value: "0"
  - id: pending_command
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: command_updated
    type: bool
    restore_value: false
    initial_value: "false"

# MQTT — communicates with WarehouseCore using the same topic structure
# as the Arduino firmware
mqtt:
  id: mqtt_client
  broker: !secret mqtt_host
  port: !secret mqtt_port
  username: !secret mqtt_user
  password: !secret mqtt_password
  discovery: true
  on_connect:
    - lambda: |-
        ESP_LOGI("mqtt", "Connected, subscribing to command topic");
    - mqtt.subscribe:
        topic: !lambda |-
          return "${topic_prefix}/" + id(topic_suffix) + "/cmd";
        then:
          - lambda: |-
              std::string payload_str(x.c_str());
              ESP_LOGI("mqtt", "Command received (%zu bytes)", payload_str.size());

              // Parse JSON using ArduinoJson (included via Arduino framework)
              DynamicJsonDocument doc(4096);
              DeserializationError error = deserializeJson(doc, payload_str);
              if (error) {
                ESP_LOGW("mqtt", "JSON parse error: %s", error.c_str());
                return;
              }

              const char* op = doc["op"];
              if (!op) {
                ESP_LOGW("mqtt", "Missing 'op' field");
                return;
              }

              if (strcmp(op, "highlight") == 0) {
                // Store the command JSON for the LED effect to read
                id(pending_command) = payload_str;
                id(command_updated) = true;

                // Turn on the light with the warehousecore effect
                auto call = id(led_strip).turn_on();
                call.set_effect("warehousecore");
                call.perform();

                // Count active pixels
                int pixel_count = 0;
                JsonArray shelves = doc["shelves"];
                for (JsonObject shelf : shelves) {
                  JsonArray bins = shelf["bins"];
                  for (JsonObject bin_obj : bins) {
                    pixel_count += bin_obj["pixels"].size();
                  }
                }
                id(active_led_count) = pixel_count;
                ESP_LOGI("cmd", "Highlight: %d pixels", pixel_count);

              } else if (strcmp(op, "clear") == 0) {
                auto call = id(led_strip).turn_off();
                call.perform();
                id(active_led_count) = 0;
                ESP_LOGI("cmd", "Clear: all LEDs off");

              } else if (strcmp(op, "identify") == 0) {
                auto call = id(led_strip).turn_on();
                call.set_effect("identify");
                call.perform();
                ESP_LOGI("cmd", "Identify: flashing all LEDs");

              } else if (strcmp(op, "config") == 0) {
                // In ESPHome, LED count and pin are set at compile time.
                // Log the request but no runtime change is possible.
                ESP_LOGI("cmd", "Config received (compile-time in ESPHome)");

              } else if (strcmp(op, "restart") == 0) {
                ESP_LOGI("cmd", "Restart scheduled...");
                id(schedule_restart).execute();

              } else {
                ESP_LOGW("cmd", "Unknown op: %s", op);
              }
    - lambda: |-
        // Send initial heartbeat
        id(send_heartbeat).execute();

# LED strip using NeoPixelBus (SK6812 GRBW)
light:
  - platform: neopixelbus
    id: led_strip
    name: "Warehouse LEDs"
    type: GRBW
    variant: SK6812
    pin: ${led_pin}
    num_leds: ${led_count}
    default_transition_length: 0s
    effects:
      - addressable_lambda:
          name: "warehousecore"
          update_interval: 16ms
          lambda: |-
            static std::string current_cmd;
            static std::vector<std::tuple<int, uint8_t, uint8_t, uint8_t, uint8_t, uint8_t>> pixels;
            // Pattern enum: 0=breathe, 1=solid, 2=blink

            if (id(command_updated)) {
              id(command_updated) = false;
              current_cmd = id(pending_command);
              pixels.clear();

              DynamicJsonDocument doc(4096);
              if (deserializeJson(doc, current_cmd) != DeserializationError::Ok) return;

              JsonArray shelves = doc["shelves"];
              for (JsonObject shelf : shelves) {
                JsonArray bins = shelf["bins"];
                for (JsonObject bin_obj : bins) {
                  const char* hex = bin_obj["color"] | "#FF2A2A";
                  const char* pat = bin_obj["pattern"] | "breathe";
                  uint8_t inten = bin_obj["intensity"] | 180;
                  // Encode pattern as enum: 0=breathe, 1=solid, 2=blink
                  uint8_t pat_id = 0;
                  if (strcmp(pat, "solid") == 0) pat_id = 1;
                  else if (strcmp(pat, "blink") == 0) pat_id = 2;

                  long cv = strtol(hex + 1, nullptr, 16);
                  uint8_t r = (cv >> 16) & 0xFF;
                  uint8_t g = (cv >> 8) & 0xFF;
                  uint8_t b = cv & 0xFF;

                  JsonArray px_arr = bin_obj["pixels"];
                  for (JsonVariant px : px_arr) {
                    int idx = px.as<int>();
                    if (idx >= 0 && idx < it.size()) {
                      pixels.push_back(std::make_tuple(idx, r, g, b, pat_id, inten));
                    }
                  }
                }
              }
              it.all() = Color::BLACK;
            }

            unsigned long now = millis();
            for (auto& [idx, r, g, b, pattern, intensity] : pixels) {
              uint8_t pr = r, pg = g, pb = b;
              if (pattern == 1) { // solid
                pr = (r * intensity) / 255;
                pg = (g * intensity) / 255;
                pb = (b * intensity) / 255;
              } else if (pattern == 2) { // blink
                if ((now / 500) % 2 == 0) {
                  pr = (r * intensity) / 255;
                  pg = (g * intensity) / 255;
                  pb = (b * intensity) / 255;
                } else {
                  pr = pg = pb = 0;
                }
              } else if (pattern == 0) { // breathe
                float phase = (now / 2000.0f) * 2.0f * 3.14159265f;
                float breath = (sin(phase) + 1.0f) / 2.0f;
                uint8_t bi = (uint8_t)(breath * intensity);
                pr = (r * bi) / 255;
                pg = (g * bi) / 255;
                pb = (b * bi) / 255;
              }
              it[idx] = Color(pr, pg, pb);
            }

      - addressable_lambda:
          name: "identify"
          update_interval: 300ms
          lambda: |-
            static int blink_count = 0;
            static bool is_on = false;
            if (initial_run) {
              blink_count = 0;
              is_on = false;
            }
            if (blink_count >= 6) {
              auto call = id(led_strip).turn_off();
              call.perform();
              blink_count = 0;
              return;
            }
            if (is_on) {
              it.all() = Color::BLACK;
            } else {
              it.all() = Color(255, 255, 255);
            }
            is_on = !is_on;
            blink_count++;

# Periodic heartbeat
interval:
  - interval: ${heartbeat_interval}s
    then:
      - script.execute: send_heartbeat

# Heartbeat script — publishes telemetry in the same JSON format as the
# Arduino firmware, with an additional "firmware_type":"esphome" field.
script:
  - id: send_heartbeat
    then:
      - mqtt.publish:
          topic: !lambda |-
            return "${topic_prefix}/" + id(topic_suffix) + "/status";
          payload: !lambda |-
            DynamicJsonDocument doc(768);
            doc["status"] = "online";
            doc["controller_id"] = id(controller_id);
            doc["topic_suffix"] = id(topic_suffix);
            doc["warehouse_id"] = "${warehouse_id}";
            doc["active_leds"] = id(active_led_count);
            doc["wifi_rssi"] = WiFi.RSSI();
            doc["uptime_seconds"] = (unsigned long)(millis() / 1000);
            doc["ip_address"] = WiFi.localIP().toString();
            doc["hostname"] = App.get_name();
            doc["firmware_version"] = "${firmware_version}";
            doc["firmware_type"] = "esphome";
            doc["mac_address"] = id(mac_address);
            doc["led_count"] = ${led_count};
            doc["chipset"] = "SK6812_GRBW";

            String payload;
            serializeJson(doc, payload);
            return std::string(payload.c_str());

  - id: schedule_restart
    then:
      - delay: 2s
      - lambda: |-
          App.safe_reboot();

# Sensors exposed to Home Assistant
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 30s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    mac_address:
      name: "MAC Address"

button:
  - platform: restart
    name: "Restart"
