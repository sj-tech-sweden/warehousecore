version: '3.8'

services:
  storagecore:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storagecore
    ports:
      - "8081:8081"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - storagecore-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  storagecore-network:
    driver: bridge
