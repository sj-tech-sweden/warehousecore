services:
  warehousecore:
    image: nobentie/warehousecore:latest
    container_name: warehousecore
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LED_MAPPING_FILE: "${LED_MAPPING_FILE:-/var/lib/warehousecore/led/led_mapping.json}"
    ports:
      - "8082:8082"
    volumes:
      - led-mapping:/var/lib/warehousecore/led
    networks:
      - warehousecore-network
    depends_on:
      - mosquitto
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/api/v1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
      - "9001:9001"
    environment:
      MQTT_USER: "${LED_MQTT_USER:-leduser}"
      MQTT_PASS: "${LED_MQTT_PASS:-ledpassword123}"
    volumes:
      - mosquitto-config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    entrypoint: >
      /bin/sh -c "\
      set -e; \
      mkdir -p /mosquitto/config; \
      if [ ! -f /mosquitto/config/mosquitto.conf ]; then \
        cat <<'EOF' > /mosquitto/config/mosquitto.conf\n\
listener 1883\n\
allow_anonymous false\n\
password_file /mosquitto/config/passwd\n\
log_dest stdout\n\
persistence true\n\
persistence_location /mosquitto/data/\n\
listener 9001\n\
protocol websockets\n\
EOF\n\
      fi; \
      if [ -n \"$MQTT_USER\" ]; then \
        if [ ! -f /mosquitto/config/passwd ] || ! grep -q \"^$MQTT_USER:\" /mosquitto/config/passwd 2>/dev/null; then \
          mosquitto_passwd -b /mosquitto/config/passwd \"$MQTT_USER\" \"$MQTT_PASS\"; \
        fi; \
      fi; \
      exec /docker-entrypoint.sh /usr/sbin/mosquitto -c /mosquitto/config/mosquitto.conf"
    networks:
      - warehousecore-network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  warehousecore-network:
    driver: bridge

volumes:
  led-mapping:
  mosquitto-config:
  mosquitto-data:
  mosquitto-log:
