# Mosquitto MQTT Broker Configuration
# For StorageCore LED Warehouse Highlighting System

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection Settings
max_connections -1
max_queued_messages 1000

# Security - Authentication Required
allow_anonymous false
password_file /mosquitto/config/passwords

# Listeners

# Plain MQTT (port 1883) - for local/development use
listener 1883
protocol mqtt

# MQTT over TLS (port 8883) - for production use
# Uncomment and configure when you have SSL certificates:
# listener 8883
# protocol mqtt
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# require_certificate false

# WebSocket (port 9001) - optional, for web-based MQTT clients
listener 9001
protocol websockets

# Access Control
# ACL file can be added for fine-grained topic permissions
# acl_file /mosquitto/config/acl.conf
